worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream web_app {
    server web:3000;
  }

  upstream api_app {
    server api:8000;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api_app;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}

